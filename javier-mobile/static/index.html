<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JAVIER">
<meta name="theme-color" content="#04080f">
<title>JAVIER</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<style>
  :root {
    --bg: #04080f;
    --panel: #0a1420;
    --cyan: #37c8f0;
    --cyan-dim: #1a5a70;
    --text: #cfe8f2;
    --muted: #5f7d8c;
    --user: #12283a;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: radial-gradient(ellipse at 50% -20%, #0a1e30 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    display: flex; flex-direction: column;
    height: 100dvh;
  }
  header {
    padding: calc(var(--sat) + 10px) 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(55, 200, 240, 0.15);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 17px; font-weight: 600; letter-spacing: 5px; color: var(--cyan);
    text-shadow: 0 0 12px rgba(55, 200, 240, 0.5);
  }
  #status { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  #status.online { color: var(--cyan); }
  #headRight { display: flex; align-items: center; gap: 10px; }
  #autoBtn {
    background: none; border: 1px solid var(--cyan-dim); color: var(--muted);
    border-radius: 12px; padding: 5px 10px; font-size: 11px; letter-spacing: 1px;
  }
  #autoBtn.on {
    color: var(--cyan); border-color: var(--cyan);
    box-shadow: 0 0 8px rgba(55, 200, 240, 0.4);
  }

  #chat {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 10px;
  }
  .msg {
    max-width: 84%; padding: 10px 14px; border-radius: 14px;
    font-size: 15px; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user {
    align-self: flex-end; background: var(--user);
    border: 1px solid rgba(55, 200, 240, 0.25); border-bottom-right-radius: 4px;
  }
  .msg.javier {
    align-self: flex-start; background: var(--panel);
    border: 1px solid rgba(55, 200, 240, 0.12); border-bottom-left-radius: 4px;
  }
  .msg.javier::before {
    content: "JAVIER"; display: block; font-size: 9px; letter-spacing: 3px;
    color: var(--cyan-dim); margin-bottom: 4px;
  }
  .msg.thinking { color: var(--muted); font-style: italic; }
  .action-btn {
    display: block; margin: 6px 0 0; padding: 12px 16px; border-radius: 12px;
    background: linear-gradient(180deg, #0f3a50, #0a2838);
    border: 1px solid var(--cyan); color: var(--cyan);
    font-size: 15px; font-weight: 600; text-align: center; text-decoration: none;
  }
  .action-btn small { display: block; font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }

  footer {
    flex-shrink: 0; padding: 10px 16px calc(var(--sab) + 12px);
    display: flex; align-items: center; gap: 12px;
    border-top: 1px solid rgba(55, 200, 240, 0.15);
    background: rgba(4, 8, 15, 0.9);
  }
  #textInput {
    flex: 1; background: var(--panel); border: 1px solid rgba(55, 200, 240, 0.25);
    border-radius: 22px; padding: 11px 16px; color: var(--text); font-size: 16px;
    outline: none; min-width: 0;
  }
  #sendBtn {
    background: none; border: 1px solid var(--cyan-dim); color: var(--cyan);
    border-radius: 50%; width: 44px; height: 44px; font-size: 18px; flex-shrink: 0;
  }

  /* Arc reactor push-to-talk */
  #reactorWrap { display: flex; justify-content: center; padding: 4px 0 0; flex-shrink: 0; }
  #reactor {
    width: 86px; height: 86px; border-radius: 50%; position: relative;
    border: none; background: radial-gradient(circle, #bdf3ff 0%, #37c8f0 28%, #0b2f42 62%, #04080f 100%);
    box-shadow: 0 0 24px rgba(55, 200, 240, 0.55), inset 0 0 18px rgba(190, 243, 255, 0.6);
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #reactor::before {
    content: ""; position: absolute; inset: 10px; border-radius: 50%;
    border: 2px solid rgba(190, 243, 255, 0.5);
  }
  #reactor::after {
    content: ""; position: absolute; inset: 22px; border-radius: 50%;
    border: 3px dashed rgba(13, 60, 80, 0.9);
  }
  #reactor.listening {
    animation: pulse 0.9s ease-in-out infinite;
    box-shadow: 0 0 46px rgba(55, 200, 240, 0.95), inset 0 0 24px #fff;
  }
  #reactor.speaking { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }
  #hint { text-align: center; font-size: 11px; color: var(--muted); padding: 6px 0 2px; letter-spacing: 1px; }
</style>
</head>
<body>
<header>
  <h1>J A V I E R</h1>
  <div id="headRight">
    <span id="status">offline</span>
    <button id="autoBtn" aria-label="Gespraechsmodus umschalten">AUTO AUS</button>
  </div>
</header>

<div id="chat"></div>

<div id="hint">ARC-REACTOR GEDRUECKT HALTEN UND SPRECHEN</div>
<div id="reactorWrap"><button id="reactor" aria-label="Push to talk"></button></div>

<footer>
  <input id="textInput" type="text" placeholder="Oder tippen..." autocomplete="off">
  <button id="sendBtn" aria-label="Senden">&#10148;</button>
</footer>

<script>
"use strict";

var chatEl = document.getElementById("chat");
var statusEl = document.getElementById("status");
var reactor = document.getElementById("reactor");
var textInput = document.getElementById("textInput");
var sendBtn = document.getElementById("sendBtn");
var autoBtn = document.getElementById("autoBtn");
var hintEl = document.getElementById("hint");

var chatLog = [];      // {role, content} - sent to backend on every request
var busy = false;
var germanVoice = null;

// Conversation mode: after JAVIER finishes speaking, the mic (AirPods)
// reopens automatically so Nate can answer hands-free. Works only while
// the app is open in the foreground - iOS does not allow background
// listening. After ~6 silent rounds the mode pauses itself to save
// battery and mic privacy.
var convMode = false;
var idleRounds = 0;
var MAX_IDLE_ROUNDS = 6;

// ---------------------------------------------------------------- UI

function addMsg(role, text) {
  var div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "javier");
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addActionButton(action) {
  var a = document.createElement("a");
  a.className = "action-btn";
  if (action.type === "link") {
    a.href = action.url;
    a.textContent = action.label + " oeffnen";
    a.target = "_blank";
    chatEl.appendChild(a);
    chatEl.scrollTop = chatEl.scrollHeight;
    return;
  }
  var num = String(action.number || "").replace(/[^+\d]/g, "");
  if (action.channel === "sms") {
    // iOS uses &body= after the number
    a.href = "sms:" + num + "&body=" + encodeURIComponent(action.text);
    a.textContent = "SMS an " + action.contact + " oeffnen";
  } else {
    a.href = "https://wa.me/" + num.replace("+", "") +
             "?text=" + encodeURIComponent(action.text);
    a.textContent = "WhatsApp an " + action.contact + " oeffnen";
  }
  var s = document.createElement("small");
  s.textContent = "Du tippst selbst auf Senden";
  a.appendChild(s);
  a.target = "_blank";
  chatEl.appendChild(a);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setStatus(text, online) {
  statusEl.textContent = text;
  statusEl.className = online ? "online" : "";
}

// ------------------------------------------------------------- speech out

// iOS blocks the FIRST speechSynthesis call unless it happens inside a
// user gesture. This silent utterance, fired from the first tap, unlocks
// audio so JAVIER's real replies are spoken out loud.
var ttsUnlocked = false;
function unlockTTS() {
  if (ttsUnlocked || !("speechSynthesis" in window)) return;
  ttsUnlocked = true;
  var u = new SpeechSynthesisUtterance(" ");
  u.volume = 0;
  speechSynthesis.speak(u);
}

function pickVoice() {
  var voices = speechSynthesis.getVoices();
  var de = voices.filter(function (v) { return v.lang && v.lang.indexOf("de") === 0; });
  if (!de.length) return null;
  // Prefer enhanced/known good German voices on iOS
  var preferred = ["Anna", "Helena", "Markus", "Petra"];
  for (var i = 0; i < preferred.length; i++) {
    for (var j = 0; j < de.length; j++) {
      if (de[j].name.indexOf(preferred[i]) !== -1) return de[j];
    }
  }
  return de[0];
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  if (!germanVoice) germanVoice = pickVoice();
  if (germanVoice) u.voice = germanVoice;
  u.lang = germanVoice ? germanVoice.lang : "de-DE";
  u.rate = 1.02;
  u.onstart = function () { reactor.classList.add("speaking"); };
  u.onend = function () {
    reactor.classList.remove("speaking");
    // Hands-free loop: reopen the mic right after JAVIER stops talking.
    if (convMode && !busy) setTimeout(startListening, 350);
  };
  speechSynthesis.speak(u);
}

if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = function () { germanVoice = pickVoice(); };
}

// -------------------------------------------------------------- speech in

var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var recLang = "de-CH";
var heard = "";

function buildRecognition() {
  if (!SR) return null;
  var r = new SR();
  r.lang = recLang;
  r.interimResults = true;
  r.continuous = false;
  r.onresult = function (e) {
    var t = "";
    for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    heard = t;
    setStatus(t.slice(-40), true);
  };
  r.onerror = function (e) {
    // Silence or an aborted round is normal (especially in auto mode) -
    // onend decides whether to re-arm the mic.
    if (e.error === "no-speech" || e.error === "aborted") return;
    // de-CH is not available on every device - fall back to de-DE once
    if ((e.error === "language-not-supported" || e.error === "not-allowed" ||
         e.error === "service-not-allowed") && recLang === "de-CH") {
      recLang = "de-DE";
      recognition = buildRecognition();
      setStatus("Fallback de-DE, nochmal druecken", false);
    } else {
      setStatus("Mikro-Fehler: " + e.error, false);
      if (convMode) setAutoMode(false);
    }
    reactor.classList.remove("listening");
  };
  r.onend = function () {
    reactor.classList.remove("listening");
    if (heard.trim()) {
      var text = heard.trim();
      heard = "";
      idleRounds = 0;
      sendToJavier(text);
      return;
    }
    // Nothing heard. In conversation mode keep the mic open for a few
    // silent rounds, then pause the mode instead of listening forever.
    if (convMode && !busy) {
      idleRounds += 1;
      if (idleRounds < MAX_IDLE_ROUNDS) {
        setStatus("hoere zu...", true);
        setTimeout(startListening, 300);
        return;
      }
      setAutoMode(false);
      setStatus("Auto pausiert - Reaktor druecken", true);
      return;
    }
    setStatus("bereit", true);
  };
  return r;
}

function startListening() {
  if (busy) return;
  if (!recognition) recognition = buildRecognition();
  if (!recognition) {
    setStatus("Spracherkennung nicht verfuegbar", false);
    addMsg("javier", "Spracherkennung wird von diesem Browser nicht " +
      "unterstuetzt. Auf dem iPhone bitte Safari verwenden - und die Seite " +
      "muss ueber HTTPS geladen sein, sonst blockiert iOS das Mikrofon.");
    return;
  }
  speechSynthesis.cancel();
  heard = "";
  reactor.classList.add("listening");
  setStatus("hoere zu...", true);
  try { recognition.start(); } catch (e) { /* already started */ }
}

function stopListening() {
  if (recognition) { try { recognition.stop(); } catch (e) {} }
}

reactor.addEventListener("touchstart", function (e) { e.preventDefault(); unlockTTS(); startListening(); });
reactor.addEventListener("touchend", function (e) { e.preventDefault(); stopListening(); });
reactor.addEventListener("touchcancel", stopListening);
reactor.addEventListener("mousedown", startListening);
reactor.addEventListener("mouseup", stopListening);

// --------------------------------------------------- conversation mode

function setAutoMode(on) {
  convMode = on;
  idleRounds = 0;
  autoBtn.textContent = on ? "AUTO AN" : "AUTO AUS";
  autoBtn.className = on ? "on" : "";
  hintEl.textContent = on
    ? "AUTO-MODUS: NACH JEDER ANTWORT HOERT JAVIER WIEDER ZU"
    : "ARC-REACTOR GEDRUECKT HALTEN UND SPRECHEN";
  if (!on) stopListening();
}

autoBtn.addEventListener("click", function () {
  unlockTTS();
  setAutoMode(!convMode);
  // The tap is the user gesture iOS needs - open the mic right away.
  if (convMode && !busy) startListening();
});

// ------------------------------------------------------------------ chat

function apiHeaders() {
  var h = { "Content-Type": "application/json" };
  var key = localStorage.getItem("javierKey");
  if (key) h["X-Javier-Key"] = key;
  return h;
}

function postChat() {
  return fetch("/api/chat", {
    method: "POST",
    headers: apiHeaders(),
    body: JSON.stringify({ messages: chatLog })
  });
}

function sendToJavier(text) {
  if (busy || !text) return;
  busy = true;
  addMsg("user", text);
  chatLog.push({ role: "user", content: text });
  setStatus("denke nach...", true);
  var thinking = addMsg("javier", "...");
  thinking.classList.add("thinking");

  postChat()
  .then(function (r) {
    // Cloud deployments are password-protected (JAVIER_PASSWORD).
    // Ask once, remember on the device, retry.
    if (r.status === 401) {
      var pw = prompt("JAVIER-Passwort eingeben:");
      if (!pw) throw new Error("Passwort erforderlich");
      localStorage.setItem("javierKey", pw);
      return postChat();
    }
    return r;
  })
  .then(function (r) {
    if (!r.ok) throw new Error(r.status === 401 ?
      "Passwort falsch" : "HTTP " + r.status);
    return r.json();
  })
  .then(function (data) {
    thinking.remove();
    addMsg("javier", data.reply);
    chatLog.push({ role: "assistant", content: data.reply });
    (data.actions || []).forEach(addActionButton);
    speak(data.reply);
    setStatus("bereit", true);
  })
  .catch(function (err) {
    thinking.remove();
    addMsg("javier", "Verbindungsproblem, Nate: " + err.message +
      ". Bitte versuch es gleich noch einmal - falls ich geschlafen " +
      "habe, brauche ich einen Moment zum Aufwachen.");
    setStatus("offline", false);
  })
  .finally(function () { busy = false; });
}

sendBtn.addEventListener("click", function () {
  unlockTTS();
  var t = textInput.value.trim();
  textInput.value = "";
  sendToJavier(t);
});
textInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter") sendBtn.click();
});

// ------------------------------------------------------------------ boot

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(function () {});
}

fetch("/api/health")
  .then(function (r) { return r.json(); })
  .then(function () {
    setStatus("bereit", true);
    addMsg("javier", "Guten Tag, Nate. JAVIER ist online. Halte den " +
      "Reaktor gedrueckt und sprich mit mir - oder tippe unten.");
  })
  .catch(function () { setStatus("Server nicht erreichbar", false); });
</script>
</body>
</html>
