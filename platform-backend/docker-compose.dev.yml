# Nur für ENTWICKLUNG. Startet die Dienste, die spätere Phasen brauchen.
# Trennung vom Produktions-Managed-Stack (Supabase/Upstash der Vercel-App).
# Start: docker compose -f docker-compose.dev.yml up -d
# Diese Datei ist Konfiguration — sie startet nichts automatisch.

services:
  postgres:                       # Phase 1 — App-/Plattform-Metadaten, RLS (Phase 6)
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: dev-only-change-me
      POSTGRES_DB: platform
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:                          # Phase 1 — Cache, Rate-Limit, kurzlebige Zustände
    image: redis:7-alpine         # Hinweis: Prod-Lizenz prüfen (siehe LICENSES.md), ggf. Valkey
    ports: ["6379:6379"]

  qdrant:                         # Phase 3 — Vektor-DB (RAG), Collection pro Mandant
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant:/qdrant/storage"]

  minio:                          # Phase 1/3 — S3-kompatibler Objektspeicher (AGPL: nur als Dienst)
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: platform
      MINIO_ROOT_PASSWORD: dev-only-change-me
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio:/data"]

  temporal:                       # Phase 5 — Durable Workflows (24/7-Agenten)
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=platform
      - POSTGRES_PWD=dev-only-change-me
      - POSTGRES_SEEDS=postgres
    ports: ["7233:7233"]
    depends_on: [postgres]

  backend:                        # Phase 9 — das platform-backend selbst (gehärtetes Image)
    build:
      context: .
      dockerfile: Dockerfile
    image: platform-backend:dev
    environment:
      PLATFORM_ENV: development
      # An die Dienste im selben Compose-Netz verdrahtet. Die DB-Rolle hier ist
      # zur Vereinfachung 'platform'; in PRODUKTION eine Rolle mit NOBYPASSRLS.
      DATABASE_URL: postgresql://platform:dev-only-change-me@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      TEMPORAL_ADDRESS: temporal:7233
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: platform
      MINIO_SECRET_KEY: dev-only-change-me
    ports: ["8000:8000"]
    # Gehärtet wie in Produktion (siehe deploy/k8s/backend.yaml).
    user: "10001:10001"
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    depends_on: [postgres, redis, qdrant]

volumes:
  pgdata:
  qdrant:
  minio:
