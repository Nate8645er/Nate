#   kubectl apply -k platform-backend/deploy/k8s
# Für Rollback:
#   kubectl -n ki-plattform rollout undo deployment/platform-backend

namespace: ki-plattform

resources:
  - namespace.yaml
  - backend.yaml

commonLabels:
  app.kubernetes.io/part-of: ki-system
