<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plattform — Chat</title>
<style>
  :root {
    --bg:#0b0d12; --panel:#12151d; --panel2:#171b25; --border:#232838;
    --text:#e7ebf3; --muted:#8b93a7; --accent:#6c8cff; --accent2:#3b5bdb;
    --ok:#2fbf71; --danger:#ff6b6b;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid var(--border); background:var(--panel); }
  header h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:.2px; }
  header .spacer { flex:1; }
  select, input, button, textarea { font:inherit; color:var(--text);
    background:var(--panel2); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; outline:none; }
  select:focus, input:focus, textarea:focus { border-color:var(--accent); }
  button { background:var(--accent2); border-color:var(--accent2); cursor:pointer;
    font-weight:600; }
  button:hover { background:var(--accent); border-color:var(--accent); }
  button.ghost { background:transparent; border-color:var(--border); font-weight:500; }
  .usage { font-size:12.5px; color:var(--muted); white-space:nowrap; }
  main { max-width:860px; margin:0 auto; padding:18px; }
  #log { display:flex; flex-direction:column; gap:12px; min-height:52vh; padding:6px 0 18px; }
  .msg { padding:12px 14px; border-radius:12px; max-width:82%; white-space:pre-wrap;
    word-wrap:break-word; }
  .msg.user { align-self:flex-end; background:var(--accent2); }
  .msg.assistant { align-self:flex-start; background:var(--panel2); border:1px solid var(--border); }
  .msg .meta { display:block; font-size:11px; color:var(--muted); margin-top:6px; }
  .composer { position:sticky; bottom:0; background:var(--bg); padding-top:10px;
    display:flex; gap:10px; align-items:flex-end; }
  .composer textarea { flex:1; resize:vertical; min-height:52px; max-height:200px; }
  .setup { background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:18px; margin-bottom:16px; }
  .setup label { display:block; font-size:12.5px; color:var(--muted); margin:0 0 6px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .hint { color:var(--muted); font-size:12.5px; }
  .err { color:var(--danger); font-size:13px; min-height:18px; }
</style>
</head>
<body>
<header>
  <h1>KI-Plattform · Chat</h1>
  <div class="spacer"></div>
  <select id="model" title="Modell wählen"></select>
  <span class="usage" id="usage">–</span>
  <button class="ghost" id="logout" title="API-Key vergessen">⎋</button>
</header>

<main>
  <div class="setup" id="setup">
    <label for="key">API-Schlüssel (aus <code>/admin/provision</code>)</label>
    <div class="row">
      <input id="key" type="password" placeholder="pk_…" style="flex:1;min-width:240px" />
      <button id="connect">Verbinden</button>
    </div>
    <p class="hint">Der Schlüssel bleibt nur lokal im Browser (localStorage). Das Modell wird pro Tarif freigeschaltet.</p>
    <div class="err" id="setupErr"></div>
  </div>

  <div id="chat" style="display:none">
    <div id="log"></div>
    <div class="composer">
      <textarea id="input" placeholder="Nachricht… (Enter sendet, Shift+Enter = Zeile)"></textarea>
      <button id="send">Senden</button>
    </div>
    <div class="err" id="chatErr"></div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let KEY = localStorage.getItem("pk") || "";
let convId = null;
let history = [];

function authHeader() { return { "Authorization": "Bearer " + KEY, "Content-Type": "application/json" }; }

async function loadModels() {
  const r = await fetch("/v1/models", { headers: authHeader() });
  if (!r.ok) throw new Error((await r.json()).detail || ("HTTP " + r.status));
  const data = await r.json();
  const sel = $("model");
  sel.innerHTML = "";
  for (const m of data.models) {
    const o = document.createElement("option");
    o.value = m.id; o.textContent = m.label + (m.local ? "" : "");
    sel.appendChild(o);
  }
  if (!data.models.length) throw new Error("Keine Modelle im Tarif freigeschaltet");
}

async function refreshUsage() {
  try {
    const r = await fetch("/v1/usage", { headers: authHeader() });
    if (!r.ok) return;
    const u = await r.json();
    $("usage").textContent = `${u.plan} · ${u.month.tokens_total}/${u.month.limit} Tokens`;
  } catch {}
}

function addMsg(role, content, meta) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = content;
  if (meta) { const s = document.createElement("span"); s.className = "meta"; s.textContent = meta; el.appendChild(s); }
  $("log").appendChild(el);
  el.scrollIntoView({ behavior: "smooth", block: "end" });
}

async function connect() {
  $("setupErr").textContent = "";
  KEY = $("key").value.trim();
  if (!KEY) { $("setupErr").textContent = "Bitte einen Schlüssel eingeben."; return; }
  try {
    await loadModels();
    localStorage.setItem("pk", KEY);
    $("setup").style.display = "none";
    $("chat").style.display = "block";
    refreshUsage();
  } catch (e) {
    $("setupErr").textContent = "Verbindung fehlgeschlagen: " + e.message;
  }
}

async function send() {
  const text = $("input").value.trim();
  if (!text) return;
  $("chatErr").textContent = "";
  $("input").value = "";
  addMsg("user", text);
  history.push({ role: "user", content: text });
  const model = $("model").value;
  $("send").disabled = true;
  try {
    const r = await fetch("/v1/chat", {
      method: "POST", headers: authHeader(),
      body: JSON.stringify({ model, messages: history, conversation_id: convId }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || ("HTTP " + r.status));
    convId = data.conversation_id;
    history.push({ role: "assistant", content: data.answer });
    addMsg("assistant", data.answer, `${model} · ${data.usage.tokens_in}→${data.usage.tokens_out} Tokens`);
    refreshUsage();
  } catch (e) {
    $("chatErr").textContent = "Fehler: " + e.message;
  } finally {
    $("send").disabled = false;
  }
}

$("connect").onclick = connect;
$("send").onclick = send;
$("logout").onclick = () => { localStorage.removeItem("pk"); location.reload(); };
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Auto-Connect, wenn ein Schlüssel gespeichert ist.
if (KEY) { $("key").value = KEY; connect(); }
</script>
</body>
</html>
