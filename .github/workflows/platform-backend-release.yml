name: platform-backend release

# Baut das gehaertete Image und pusht es bei einem Tag `pb-v*` nach GHCR.
# Additiv; laeuft nur auf Tags, beruehrt die bestehende CI nicht.
on:
  push:
    tags: ["pb-v*"]

permissions:
  contents: read
  packages: write   # noetig fuer GHCR-Push (GITHUB_TOKEN)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadaten (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/platform-backend
          tags: |
            type=match,pattern=pb-v(.*),group=1
            type=sha,format=long
      - name: Build & Push (per Digest gepinnt)
        uses: docker/build-push-action@v6
        with:
          context: platform-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
