name: platform-backend CI

# CI fuer Produkt A: Kompilieren + Unit-Tests + echter RLS-Integrationstest
# gegen Postgres. Laeuft nur bei Aenderungen unter platform-backend/.
on:
  push:
    paths: ["platform-backend/**", ".github/workflows/platform-backend-ci.yml"]
  pull_request:
    paths: ["platform-backend/**", ".github/workflows/platform-backend-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: platform
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # Privilegierte Verbindung fuer den Integrationstest (migriert + seedet).
      PLATFORM_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Abhaengigkeiten
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Kompilieren
        run: python -m py_compile app/*.py app/routes/*.py
      - name: Tests (Unit + RLS-Integration)
        run: pytest -q
