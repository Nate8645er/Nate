name: platform-backend

# Additive CI für das neue Backend. Berührt die bestehende App-CI nicht.
on:
  push:
    paths: ["platform-backend/**", ".github/workflows/platform-backend.yml"]
  pull_request:
    paths: ["platform-backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Tests (ohne GPU, ohne Netz)
        run: python -m pytest
