name: CI

on:
  push:
    branches: ["**"]
    paths: ["jarvis/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["jarvis/**", ".github/workflows/ci.yml"]

defaults:
  run:
    working-directory: jarvis

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Ruff (lint)
        run: |
          uv pip install ruff
          ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests || true

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: mypy
        run: |
          uv pip install -e ".[dev]"
          mypy src/jarvis

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Pytest
        run: pytest --cov=jarvis --cov-report=term-missing -q
        env:
          JARVIS_DATA_DIR: ${{ runner.temp }}/jarvis-data

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f jarvis/docker/Dockerfile jarvis/
        working-directory: .
